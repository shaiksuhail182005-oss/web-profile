<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster To-Do App</title>
    <link rel="stylesheet" href="todo.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Plus+Jakarta+Sans:wght@400;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="app-container">
        <header>
            <div class="logo">
                <i class="fas fa-check-double"></i>
                <h1>TaskMaster</h1>
            </div>
            <p class="subtitle">Focus on what matters most</p>
        </header>

        <section class="input-container">
            <div class="input-wrapper">
                <i class="fas fa-plus"></i>
                <input type="text" id="taskInput" placeholder="Add a new goal..." autocomplete="off">
            </div>
            <button id="addTaskBtn" aria-label="Add Task">
                <span class="btn-text">Add Item</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </section>

        <section class="list-container">
            <div class="list-header">
                <h2>Your Tasks</h2>
                <span id="taskCounter" class="counter">0 tasks</span>
            </div>
            <ul id="taskList">
                <!-- Tasks will be injected here -->
            </ul>
        </section>

        <footer>
            <p>&copy; 2026 Shaik Suhail | Full Stack Web Development</p>
        </footer>
    </main>

    <script src="todo.js"></script>
</body>

</html>
